<!DOCTYPE html>
<html>
<head>
    <title>My Notes</title>

    <style>

        body{
            background:#1e1e1e;
            color:white;
            font-family:Arial;
        }

        .search{
            width:60%;
            margin:auto;
            margin-top:20px;
        }

        .search input{
            width:100%;
            padding:12px;
            border-radius:20px;
            border:none;
            background:#2d2d2d;
            color:white;
        }

        .notes-container{
            width:320px;
            margin:auto;
            margin-top:30px;
            background:#2a2a2a;
            border-radius:10px;
            padding:20px;
        }

        .note{
            border-bottom:1px solid #444;
            margin-top:20px;
            padding-bottom:10px;
        }

        .add-btn{
            position:fixed;
            right:30px;
            bottom:30px;
            width:60px;
            height:60px;
            border:none;
            border-radius:50%;
            background:orange;
            font-size:30px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="search">
    <input type="text" placeholder="Search">
</div>

<div class="notes-container">

    <h1>My Notes</h1>

    {% for note in notes %}

    <div class="note">
        <h3>{{note.title}}</h3>
        <p>{{note.body}}</p>
    </div>

    {% endfor %}

</div>

<button class="add-btn">+</button>

</body>
</html>
